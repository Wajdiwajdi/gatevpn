<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarGate VPN - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .glass {
      background: rgba(10,15,35,0.45);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(59,130,246,0.15), 0 0 70px rgba(168,85,247,0.08);
    }
    .glow-text {
      background: linear-gradient(90deg, #38bdf8, #3b82f6, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    input {
      outline: none;
    }
    video {
      filter: brightness(0.65);
    }
    .message-box {
      padding: 12px 16px;
      border-radius: 12px;
      margin-top: 16px;
      text-align: center;
      font-weight: 500;
      display: none;
    }
    .message-box.show {
      display: block;
    }
    .message-box.error {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.5);
      color: #fca5a5;
    }
    .message-box.success {
      background: rgba(34, 197, 94, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.5);
      color: #86efac;
    }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-black">
  <video autoplay muted loop playsinline class="fixed inset-0 w-full h-full object-cover z-0">
    <source src="space.mp4" type="video/mp4">
  </video>
  <div class="fixed inset-0 bg-black/50 z-[1]"></div>
  <div id="stars" class="fixed inset-0 pointer-events-none z-10"></div>

  <div class="relative z-30">
    <!-- AUTH PAGE -->
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="glass p-10 rounded-3xl w-full max-w-md">
        <div class="text-center mb-10">
          <h1 class="text-6xl font-extrabold glow-text">StarGate VPN</h1>
          <p class="text-cyan-300 mt-3">Private Tunnel Through Space</p>
        </div>

        <div id="loginForm">
          <input id="email" type="email" placeholder="Email Address"
            class="w-full p-4 mb-4 rounded-2xl bg-black/30 border border-white/20 focus:border-cyan-400 text-white placeholder-gray-400">

          <input id="password" type="password" placeholder="Password"
            class="w-full p-4 mb-6 rounded-2xl bg-black/30 border border-white/20 focus:border-cyan-400 text-white placeholder-gray-400">

          <button onclick="signIn()" 
            class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-2xl font-semibold text-lg mb-3 transition">
            Login
          </button>

          <button onclick="toggleForm()" 
            class="w-full bg-purple-600 hover:bg-purple-700 p-4 rounded-2xl font-semibold text-lg transition">
            Create New Account
          </button>
        </div>

        <div id="signupForm" class="hidden">
          <input id="signupEmail" type="email" placeholder="Email Address"
            class="w-full p-4 mb-4 rounded-2xl bg-black/30 border border-white/20 focus:border-cyan-400 text-white placeholder-gray-400">

          <input id="signupPassword" type="password" placeholder="Password"
            class="w-full p-4 mb-4 rounded-2xl bg-black/30 border border-white/20 focus:border-cyan-400 text-white placeholder-gray-400">

          <input id="confirmPassword" type="password" placeholder="Confirm Password"
            class="w-full p-4 mb-6 rounded-2xl bg-black/30 border border-white/20 focus:border-cyan-400 text-white placeholder-gray-400">

          <button onclick="signUp()" 
            class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-2xl font-semibold text-lg mb-3 transition">
            Register
          </button>

          <button onclick="toggleForm()" 
            class="w-full bg-gray-600 hover:bg-gray-700 p-4 rounded-2xl font-semibold text-lg transition">
            Back to Login
          </button>
        </div>

        <div id="message" class="message-box"></div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://rbmgzryxrtdnpqizxgob.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibWd6cnl4cnRkbnBxaXp4Z29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDY3MzgsImV4cCI6MjA5NjA4MjczOH0.-p8xJ_DOqoqzynian8rTHJqVZi2ZfZF4CAE-wzw2opo";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    

    function toggleForm() {
      document.getElementById('loginForm').classList.toggle('hidden');
      document.getElementById('signupForm').classList.toggle('hidden');
      document.getElementById('message').classList.remove('show');
    }

    function showMessage(text, isError = false) {
      const msgEl = document.getElementById('message');
      msgEl.textContent = text;
      msgEl.className = `message-box show ${isError ? 'error' : 'success'}`;
    }

    async function checkEmailExists(email) {
      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password: "dummy_password_just_to_check"
        });
        if (error && error.message && error.message.toLowerCase().includes('invalid')) {
          return true; 
        }
        return false;
      } catch (err) {
        return false;
      }
    }

    async function signUp() {
      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();
      const confirmPassword = document.getElementById("confirmPassword").value.trim();

      if (!email || !password || !confirmPassword) {
        showMessage("Please fill all fields", true);
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Passwords do not match", true);
        return;
      }

      if (password.length < 6) {
        showMessage("Password must be at least 6 characters", true);
        return;
      }
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailRegex.test(email)) {
        showMessage("Invalid email address", true);
        return;
      }

      try {
        const emailExists = await checkEmailExists(email);
        if (!emailExists) {
          showMessage("This email is already used", true);
          return;
        }

        const { data, error } = await supabaseClient.auth.signUp({ 
          email, 
          password,
          options: {
            emailRedirectTo: window.location.origin
          }
        });

        if (error) {
          if (error.message && (error.message.toLowerCase().includes('already') || error.message.toLowerCase().includes('exists'))) {
            showMessage("This email is already used", true);
          } else if (error.message && error.message.toLowerCase().includes('invalid')) {
            showMessage("Invalid email address", true);
          } else {
            showMessage(`Error: ${error.message}`, true);
          }
        } else {
          showMessage("✓ Account created! Check your email to confirm.");
          document.getElementById("signupEmail").value = '';
          document.getElementById("signupPassword").value = '';
          document.getElementById("confirmPassword").value = '';
          setTimeout(() => toggleForm(), 2000);
        }
      } catch (err) {
        showMessage(`Error: ${err.message}`, true);
      }
    }

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showMessage("Please fill all fields", true);
        return;
      }

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({ 
          email, 
          password 
        });

        if (error) {
          if (error.message && error.message.toLowerCase().includes('invalid')) {
            showMessage("Invalid email or password", true);
          } else {
            showMessage(`Error: ${error.message}`, true);
          }
        } else {
          showMessage("✓ Login successful! Redirecting...");
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        }
      } catch (err) {
        showMessage(`Error: ${err.message}`, true);
      }
    }

    window.onload = async () => {
      createStars();
      try {
        const { data } = await supabaseClient.auth.getSession();
        if (data.session) {
          window.location.href = 'index.html';
        }
      } catch (err) {
        console.log('Session check error:', err);
      }
    };
  </script>
</body>
</html>

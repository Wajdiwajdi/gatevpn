<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarGate VPN • Secure Space Tunnel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%); color: #e0e7ff; font-family: 'Segoe UI', sans-serif; }
    .astronaut { animation: floatAstronaut 9s ease-in-out infinite; }
    @keyframes floatAstronaut { 0%,100% { transform: translateY(0) rotate(-8deg); } 50% { transform: translateY(-50px) rotate(8deg); } }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle 6s infinite; }
  </style>
</head>
<body class="min-h-screen relative overflow-hidden">

  <div id="stars" class="fixed inset-0 pointer-events-none"></div>
  <div class="fixed bottom-10 right-10 text-[190px] z-50 astronaut">🧑‍🚀</div>

  <div class="max-w-4xl mx-auto p-6 relative z-10">

    <!-- Login / Register -->
    <div id="authPage">
      <div class="text-center py-12">
        <h1 class="text-5xl font-bold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">StarGate VPN</h1>
        <p class="text-blue-300">Private • Secure • Anonymous</p>
      </div>

      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-10 border border-white/20 max-w-md mx-auto">
        <h2 class="text-3xl font-semibold text-center mb-8">Access Portal</h2>
        <div class="space-y-5">
          <input type="email" id="email" placeholder="Email Address" class="w-full px-6 py-4 bg-white/10 border border-white/30 rounded-2xl focus:border-blue-400">
          <input type="text" id="username" placeholder="Username" class="w-full px-6 py-4 bg-white/10 border border-white/30 rounded-2xl focus:border-blue-400">
          <input type="password" id="password" placeholder="Password" class="w-full px-6 py-4 bg-white/10 border border-white/30 rounded-2xl focus:border-blue-400">
          <button onclick="handleAuth()" class="w-full py-4 bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl font-semibold text-lg">Login / Register</button>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
      <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold">Welcome, <span id="userName" class="text-blue-400"></span></h1>
        <button onclick="logout()" class="text-red-400"><i class="fas fa-sign-out-alt text-2xl"></i></button>
      </div>

      <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
        <h2 class="text-2xl mb-6">Your Personal VPN Config</h2>
        
        <div id="configArea"></div>

        <div class="mt-10">
          <h3 class="font-semibold mb-4">How to Use:</h3>
          <ol class="list-decimal pl-5 space-y-3 text-gray-300">
            <li>Download the config file below</li>
            <li>Install WireGuard from official website or app store</li>
            <li>Import the .conf file</li>
            <li>Connect and enjoy private internet</li>
          </ol>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;

    function handleAuth() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !username || !password) {
        alert("All fields are required");
        return;
      }

      currentUser = { email, username };
      localStorage.setItem('stargate_current_user', JSON.stringify(currentUser));

      document.getElementById('authPage').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      document.getElementById('userName').textContent = username;

      showConfigStatus();
    }

    function showConfigStatus() {
      const configs = JSON.parse(localStorage.getItem('stargate_configs') || '{}');
      const area = document.getElementById('configArea');

      if (configs[currentUser.email]) {
        area.innerHTML = `
          <p class="text-green-400 mb-4">✅ You already have a config file</p>
          <button onclick="downloadConfig()" class="px-8 py-4 bg-green-600 rounded-2xl font-semibold flex items-center gap-3">
            <i class="fas fa-download"></i> Download Config
          </button>`;
      } else {
        area.innerHTML = `
          <button onclick="generateNewConfig()" class="px-8 py-4 bg-blue-600 rounded-2xl font-semibold">
            Generate My VPN Config
          </button>`;
      }
    }

    function generateNewConfig() {
      let configs = JSON.parse(localStorage.getItem('stargate_configs') || '{}');
      
      if (configs[currentUser.email]) {
        alert("You already have one config.");
        return;
      }

      configs[currentUser.email] = { created: new Date().toISOString() };
      localStorage.setItem('stargate_configs', JSON.stringify(configs));

      alert("✅ Config generated successfully!");
      showConfigStatus();
    }

    function downloadConfig() {
      const content = `# ===================== StarGate VPN =====================
# User: ${currentUser.username}
# Email: ${currentUser.email}
# Generated: ${new Date().toLocaleString()}

[Interface]
PrivateKey = YOUR_PRIVATE_KEY_HERE
Address = 10.13.13.2/32
DNS = 1.1.1.1

[Peer]
PublicKey = SERVER_PUBLIC_KEY_HERE
AllowedIPs = 0.0.0.0/0
Endpoint = myvpn123.duckdns.org:51820
PersistentKeepalive = 25`;

      const blob = new Blob([content], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `stargate-${currentUser.username}.conf`;
      a.click();
    }

    function logout() {
      if (confirm("Logout?")) location.reload();
    }

    // Create Stars
    function createStars() {
      const container = document.getElementById('stars');
      for (let i = 0; i < 200; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}vw`;
        star.style.top = `${Math.random() * 100}vh`;
        star.style.animationDelay = `-${Math.random() * 8}s`;
        container.appendChild(star);
      }
    }

    window.onload = createStars;
  </script>
</body>
</html>

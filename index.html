<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StarGate VPN</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>
body{
    font-family:'Segoe UI',sans-serif;
    color:white;
}

.glass{
    background:rgba(10,15,35,.45);
    backdrop-filter:blur(24px);
    border:1px solid rgba(255,255,255,.1);
    box-shadow:
        0 0 25px rgba(59,130,246,.15),
        0 0 70px rgba(168,85,247,.08);
}

.glow-text{
    background:linear-gradient(
        90deg,
        #38bdf8,
        #3b82f6,
        #a855f7
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

input{
    outline:none;
}

video{
    filter:brightness(.65);
}
</style>
</head>

<body class="min-h-screen overflow-x-hidden">

<!-- VIDEO BACKGROUND -->
<video
autoplay
muted
loop
playsinline
class="fixed inset-0 w-full h-full object-cover z-0">
    <source src="space.mp4" type="video/mp4">
</video>

<!-- OVERLAY -->
<div class="fixed inset-0 bg-black/50 z-[1]"></div>

<!-- CONTENT -->
<div class="relative z-10">

<!-- LOGIN PAGE -->
<div id="authPage" class="min-h-screen flex flex-col justify-center items-center p-6">

    <div class="text-center mb-12">
        <h1 class="text-7xl font-extrabold glow-text">
            StarGate VPN
        </h1>

        <p class="text-cyan-300 text-xl mt-4">
            Private Tunnel Through Space
        </p>
    </div>

    <div class="glass rounded-3xl p-10 w-full max-w-md">

        <h2 class="text-3xl font-semibold text-center mb-8">
            Login / Register
        </h2>

        <div class="space-y-5">

            <div class="relative">
                <i class="fas fa-envelope absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>

                <input
                id="email"
                type="email"
                placeholder="Email Address"
                class="w-full pl-14 pr-4 py-4 rounded-2xl bg-black/20 border border-white/20">
            </div>

            <div class="relative">
                <i class="fas fa-user absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>

                <input
                id="username"
                type="text"
                placeholder="Username"
                class="w-full pl-14 pr-4 py-4 rounded-2xl bg-black/20 border border-white/20">
            </div>

            <div class="relative">
                <i class="fas fa-lock absolute left-5 top-1/2 -translate-y-1/2 text-gray-400"></i>

                <input
                id="password"
                type="password"
                placeholder="Password"
                class="w-full pl-14 pr-4 py-4 rounded-2xl bg-black/20 border border-white/20">
            </div>

            <button
            onclick="handleAuth()"
            class="w-full py-4 rounded-2xl font-semibold text-lg bg-gradient-to-r from-blue-500 to-purple-600 hover:scale-105 transition">
                Continue
            </button>

        </div>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden min-h-screen p-6">

    <div class="max-w-7xl mx-auto">

        <div class="flex justify-between items-center mb-10">

            <h1 class="text-4xl font-bold">
                Welcome back,
                <span id="userName" class="text-cyan-400"></span>
            </h1>

            <button onclick="logout()">
                <i class="fas fa-sign-out-alt text-red-400 text-2xl"></i>
            </button>

        </div>

        <div class="grid lg:grid-cols-2 gap-8">

            <!-- CONFIG CARD -->
            <div class="glass rounded-3xl p-8">

                <h2 class="text-2xl font-semibold mb-6">
                    Your WireGuard Client
                </h2>

                <div id="configArea"></div>

            </div>

            <!-- GUIDE CARD -->
            <div class="glass rounded-3xl p-8">

                <h2 class="text-2xl font-semibold mb-6">
                    How To Connect
                </h2>

                <ol class="space-y-4 text-gray-300 list-decimal pl-5">

                    <li>Download your VPN config file.</li>

                    <li>Install WireGuard on your device.</li>

                    <li>Import the downloaded .conf file.</li>

                    <li>Connect to StarGate VPN.</li>

                    <li>Enjoy a secure private tunnel.</li>

                </ol>

                <div class="mt-10 text-center">
                    <i class="fas fa-shield-halved text-7xl text-purple-400"></i>
                </div>

            </div>

        </div>
    </div>

</div>

</div>

<script>

let currentUser = null;

function handleAuth(){

    const email =
    document.getElementById("email")
    .value.trim().toLowerCase();

    const username =
    document.getElementById("username")
    .value.trim();

    const password =
    document.getElementById("password")
    .value.trim();

    if(!email || !username || !password){
        alert("Please fill all fields");
        return;
    }

    currentUser = {
        email,
        username
    };

    localStorage.setItem(
        "stargate_current_user",
        JSON.stringify(currentUser)
    );

    document
    .getElementById("authPage")
    .classList.add("hidden");

    document
    .getElementById("dashboard")
    .classList.remove("hidden");

    document
    .getElementById("userName")
    .textContent = username;

    showConfigStatus();
}

function showConfigStatus(){

    const configs =
    JSON.parse(
        localStorage.getItem(
            "stargate_configs"
        ) || "{}"
    );

    const area =
    document.getElementById(
        "configArea"
    );

    if(configs[currentUser.email]){

        area.innerHTML = `
        <p class="text-green-400 mb-6">
        ✅ Configuration already exists
        </p>

        <button
        onclick="downloadConfig()"
        class="px-8 py-4 rounded-2xl bg-green-600 hover:bg-green-700">

            <i class="fas fa-download mr-2"></i>
            Download Config

        </button>
        `;

    }else{

        area.innerHTML = `
        <p class="text-yellow-400 mb-6">
        No VPN configuration found.
        </p>

        <button
        onclick="generateNewConfig()"
        class="px-8 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700">

            Generate New Config

        </button>
        `;
    }
}

function generateNewConfig(){

    const configs =
    JSON.parse(
        localStorage.getItem(
            "stargate_configs"
        ) || "{}"
    );

    if(configs[currentUser.email]){
        alert("Config already exists.");
        return;
    }

    configs[currentUser.email] = {
        created:new Date().toISOString()
    };

    localStorage.setItem(
        "stargate_configs",
        JSON.stringify(configs)
    );

    alert("Configuration created!");
    showConfigStatus();
}

function downloadConfig(){

    const content = `
[Interface]
PrivateKey = YOUR_PRIVATE_KEY
Address = 10.13.13.2/32
DNS = 1.1.1.1

[Peer]
PublicKey = SERVER_PUBLIC_KEY
AllowedIPs = 0.0.0.0/0
Endpoint = vpn.example.com:51820
PersistentKeepalive = 25
`;

    const blob =
    new Blob(
        [content],
        {type:"text/plain"}
    );

    const a =
    document.createElement("a");

    a.href =
    URL.createObjectURL(blob);

    a.download =
    "stargate.conf";

    a.click();
}

function logout(){
    location.reload();
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarGate VPN</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase (IMPORTANT: MUST be window.supabase) -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      color: white;
    }

    .glass {
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>

<body class="bg-black min-h-screen flex items-center justify-center">

<!-- AUTH -->
<div id="authBox" class="glass p-8 rounded-2xl w-96">

  <h1 class="text-3xl mb-6 text-center">StarGate VPN</h1>

  <input id="email" type="email" placeholder="Email"
    class="w-full p-3 mb-3 rounded bg-black/50 border border-white/20">

  <input id="password" type="password" placeholder="Password"
    class="w-full p-3 mb-5 rounded bg-black/50 border border-white/20">

  <button onclick="signIn()"
    class="w-full bg-blue-600 p-3 rounded mb-3 hover:bg-blue-700">
    Login
  </button>

  <button onclick="signUp()"
    class="w-full bg-purple-600 p-3 rounded hover:bg-purple-700">
    Register
  </button>

</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden glass p-8 rounded-2xl w-[500px] text-center">

  <h2 class="text-2xl mb-4">Welcome <span id="user"></span></h2>

  <button onclick="generateConfig()"
    class="bg-green-600 p-3 rounded w-full hover:bg-green-700">
    Generate VPN Config
  </button>

  <pre id="output" class="mt-5 text-xs bg-black/50 p-3 rounded overflow-auto"></pre>

  <button onclick="logout()"
    class="mt-5 text-red-400">
    Logout
  </button>

</div>

<script>
console.log("JS loaded OK");

/* ================== SUPABASE ================== */
const SUPABASE_URL = "https://rbmgzryxrtdnpqizxgob.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibWd6cnl4cnRkbnBxaXp4Z29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDY3MzgsImV4cCI6MjA5NjA4MjczOH0.-p8xJ_DOqoqzynian8rTHJqVZi2ZfZF4CAE-wzw2opo";

/* IMPORTANT FIX */
const supabaseClient = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let user = null;

/* ================== SIGN UP ================== */
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) return alert(error.message);

  alert("Account created! Now login.");
}

/* ================== SIGN IN ================== */
async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  user = data.user;

  showDashboard();
}

/* ================== DASHBOARD ================== */
function showDashboard() {
  document.getElementById("authBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("user").innerText =
    user.email.split("@")[0];
}

/* ================== CONFIG ================== */
function generateConfig() {
  const config = `
# StarGate VPN
# User: ${user.email}
# Generated: ${new Date().toLocaleString()}

[Interface]
PrivateKey = YOUR_PRIVATE_KEY
Address = 10.0.0.2/32
DNS = 1.1.1.1

[Peer]
PublicKey = SERVER_PUBLIC_KEY
Endpoint = your-server.com:51820
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25
`;

  document.getElementById("output").textContent = config;
}

/* ================== LOGOUT ================== */
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================== AUTO SESSION ================== */
window.onload = async () => {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    user = data.session.user;
    showDashboard();
  }
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarGate VPN</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family:'Segoe UI',sans-serif; color:white; }
    .glass { background:rgba(10,15,35,0.45); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.1); }
    .glow-text { background:linear-gradient(90deg,#38bdf8,#3b82f6,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-black">

  <video autoplay muted loop playsinline class="fixed inset-0 w-full h-full object-cover z-0">
    <source src="space.mp4" type="video/mp4">
  </video>
  <div class="fixed inset-0 bg-black/50 z-[1]"></div>

  <div class="relative z-30">

    <!-- AUTH -->
    <div id="authBox" class="min-h-screen flex items-center justify-center p-6">
      <div class="glass p-10 rounded-3xl w-full max-w-md">
        <h1 class="text-6xl font-extrabold glow-text text-center mb-2">StarGate VPN</h1>
        <p class="text-cyan-300 text-center mb-10">Private Tunnel Through Space</p>

        <input id="email" type="email" placeholder="Email Address" class="w-full p-4 mb-4 rounded-2xl bg-black/30 border border-white/20">
        <input id="password" type="password" placeholder="Password" class="w-full p-4 mb-6 rounded-2xl bg-black/30 border border-white/20">

        <button onclick="signIn()" class="w-full bg-blue-600 p-4 rounded-2xl mb-3 font-semibold">Login</button>
        <button onclick="signUp()" class="w-full bg-purple-600 p-4 rounded-2xl font-semibold">Register</button>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden min-h-screen p-6">
      <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
          <h2 class="text-4xl font-bold">Welcome, <span id="user" class="text-cyan-400"></span></h2>
          <button onclick="logout()" class="text-red-400 text-3xl"><i class="fas fa-sign-out-alt"></i></button>
        </div>

        <div class="glass rounded-3xl p-8">
          <h3 class="text-2xl mb-6">Your VPN Configuration</h3>
          
          <button onclick="generateAndUploadConfig()" 
            class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-2xl mb-4 font-semibold">
            Generate & Save Config
          </button>

          <button onclick="downloadMyConfig()" 
            class="w-full bg-blue-600 hover:bg-blue-700 p-4 rounded-2xl font-semibold">
            Download My Config
          </button>

          <pre id="output" class="mt-6 bg-black/60 p-6 rounded-2xl text-sm max-h-96 overflow-auto"></pre>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://rbmgzryxrtdnpqizxgob.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibWd6cnl4cnRkbnBxaXp4Z29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDY3MzgsImV4cCI6MjA5NjA4MjczOH0.-p8xJ_DOqoqzynian8rTHJqVZi2ZfZF4CAE-wzw2opo";

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentUser = null;

    async function signUp() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Fill all fields");

      const { error } = await supabase.auth.signUp({ email, password });
      if (error) alert(error.message);
      else alert("Account created! Check your email.");
    }

    async function signIn() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      if (!email || !password) return alert("Fill all fields");

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return alert(error.message);

      currentUser = data.user;
      showDashboard();
    }

    function showDashboard() {
      document.getElementById("authBox").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      document.getElementById("user").innerText = currentUser.email.split("@")[0];
    }

    // Generate & Upload Config to Supabase Storage
    async function generateAndUploadConfig() {
      const configContent = `# StarGate VPN - 24/7 Ready
# User: ${currentUser.email}
# Generated: ${new Date().toLocaleString()}

[Interface]
PrivateKey = YOUR_PRIVATE_KEY_HERE
Address = 10.13.13.2/32
DNS = 1.1.1.1
MTU = 1420

[Peer]
PublicKey = SERVER_PUBLIC_KEY_HERE
AllowedIPs = 0.0.0.0/0
Endpoint = myvpn123.duckdns.org:51820
PersistentKeepalive = 25`;

      const fileName = `${currentUser.id}.conf`;

      const { error } = await supabase.storage
        .from('vpn-configs')
        .upload(fileName, configContent, {
          contentType: 'text/plain',
          upsert: true
        });

      if (error) {
        alert("Upload failed: " + error.message);
      } else {
        alert("✅ Config saved successfully in Supabase!");
        document.getElementById("output").textContent = configContent;
      }
    }

    // Download Config
    async function downloadMyConfig() {
      const fileName = `${currentUser.id}.conf`;

      const { data, error } = await supabase.storage
        .from('vpn-configs')
        .download(fileName);

      if (error) {
        alert("No config found. Generate one first.");
        return;
      }

      const text = await data.text();
      document.getElementById("output").textContent = text;

      const blob = new Blob([text], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `stargate-${currentUser.email.split('@')[0]}.conf`;
      a.click();
    }

    async function logout() {
      await supabase.auth.signOut();
      location.reload();
    }

    window.onload = async () => {
      const { data } = await supabase.auth.getSession();
      if (data.session) {
        currentUser = data.session.user;
        showDashboard();
      }
    };
  </script>
</body>
</html>

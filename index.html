<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StarGate VPN</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <!-- ✅ FIXED SUPABASE IMPORT -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    body { font-family: 'Segoe UI', sans-serif; color: white; }
    .glass {
      background: rgba(10,15,35,.45);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.1);
    }
    .glow-text {
      background: linear-gradient(90deg,#38bdf8,#3b82f6,#a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    video { filter: brightness(.65); }
  </style>
</head>

<body class="min-h-screen overflow-x-hidden">

<!-- BACKGROUND -->
<video autoplay muted loop playsinline class="fixed inset-0 w-full h-full object-cover z-0">
  <source src="space.mp4" type="video/mp4">
</video>

<div class="fixed inset-0 bg-black/50 z-[1]"></div>

<div class="relative z-10">

  <!-- AUTH -->
  <div id="authPage" class="min-h-screen flex flex-col justify-center items-center p-6">

    <h1 class="text-6xl font-bold glow-text mb-10">StarGate VPN</h1>

    <div class="glass rounded-3xl p-8 w-full max-w-md">

      <input id="email" type="email" placeholder="Email"
        class="w-full mb-4 p-4 rounded-xl bg-black/30 border border-white/20">

      <input id="password" type="password" placeholder="Password"
        class="w-full mb-6 p-4 rounded-xl bg-black/30 border border-white/20">

      <button onclick="signIn()"
        class="w-full py-3 mb-3 rounded-xl bg-blue-600 hover:bg-blue-700 font-bold">
        Login
      </button>

      <button onclick="signUp()"
        class="w-full py-3 rounded-xl bg-purple-600 hover:bg-purple-700 font-bold">
        Register
      </button>

    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashboard" class="hidden min-h-screen p-8">

    <div class="flex justify-between items-center mb-10">
      <h1 class="text-3xl font-bold">
        Welcome <span id="userName" class="text-cyan-400"></span>
      </h1>

      <button onclick="logout()" class="text-red-400 text-2xl">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>

    <div class="glass p-8 rounded-3xl max-w-3xl">
      <h2 class="text-2xl mb-4">Your VPN Config</h2>

      <button onclick="generateConfig()"
        class="w-full py-3 bg-green-600 hover:bg-green-700 rounded-xl font-bold">
        Generate Config
      </button>

      <pre id="configBox" class="mt-6 text-xs bg-black/40 p-4 rounded-xl overflow-auto"></pre>
    </div>

  </div>

</div>

<script>
/* ================== SUPABASE CONFIG ================== */
const SUPABASE_URL = "https://rbmgzryxrtdnpqizxgob.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJibWd6cnl4cnRkbnBxaXp4Z29iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1MDY3MzgsImV4cCI6MjA5NjA4MjczOH0.-p8xJ_DOqoqzynian8rTHJqVZi2ZfZF4CAE-wzw2opo";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;

/* ================== SIGN UP ================== */
async function signUp() {
  const email = email.value;
  const password = password.value;

  const { error } = await supabaseClient.auth.signUp({
    email,
    password
  });

  if (error) return alert(error.message);

  alert("Account created! Now login.");
}

/* ================== LOGIN ================== */
async function signIn() {
  const email = email.value;
  const password = password.value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) return alert(error.message);

  currentUser = data.user;

  showDashboard();
}

/* ================== DASHBOARD ================== */
function showDashboard() {
  document.getElementById("authPage").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("userName").textContent =
    currentUser.email.split("@")[0];
}

/* ================== CONFIG ================== */
function generateConfig() {
  const config = `
# StarGate VPN
# User: ${currentUser.email}
# Date: ${new Date().toLocaleString()}

[Interface]
PrivateKey = YOUR_PRIVATE_KEY
Address = 10.13.13.2/32
DNS = 1.1.1.1

[Peer]
PublicKey = SERVER_PUBLIC_KEY
Endpoint = your-server.com:51820
AllowedIPs = 0.0.0.0/0
PersistentKeepalive = 25
`;

  document.getElementById("configBox").textContent = config;
}

/* ================== LOGOUT ================== */
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================== AUTO LOGIN ================== */
window.onload = async () => {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    currentUser = data.session.user;
    showDashboard();
  }
};
</script>

</body>
</html>
